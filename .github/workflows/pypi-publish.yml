name: Publish to PyPI

# Triggered when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token required once
# the publisher is configured at https://pypi.org/manage/account/publishing/
# (provider: GitHub, owner: YichengYang-Ethan, repo: oracle3,
#  workflow: pypi-publish.yml, environment: pypi).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish oracle3 to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/oracle3
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry>=1.9.0"

      - name: Verify version matches the tag
        run: |
          poetry_ver=$(poetry version -s)
          tag_ver="${GITHUB_REF_NAME#v}"
          echo "pyproject version: ${poetry_ver}"
          echo "release tag:       ${tag_ver}"
          if [ -n "${tag_ver}" ] && [ "${poetry_ver}" != "${tag_ver}" ]; then
            echo "::error::pyproject.toml version (${poetry_ver}) does not match release tag (${tag_ver})"
            exit 1
          fi

      - name: Build sdist and wheel
        run: poetry build

      - name: List built artifacts
        run: ls -la dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
