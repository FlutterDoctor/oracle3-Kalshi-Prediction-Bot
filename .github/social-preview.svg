  <text x="640" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="500" fill="url(#accent)" text-anchor="middle" letter-spacing="6">AUTONOMOUS  ·  ON-CHAIN  ·  OPEN-SOURCE</text>

  <text x="640" y="270" font-family="-apple-system, system-ui, sans-serif" font-size="180" font-weight="900" fill="url(#title)" text-anchor="middle" letter-spacing="-6">oracle3</text>

  <text x="640" y="360" font-family="-apple-system, system-ui, sans-serif" font-size="44" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">AI Agent for Prediction Markets</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600">
